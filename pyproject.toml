[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mailgent"
version = "0.1.0"
description = "Official Python SDK for the Mailgent API — identity infrastructure for AI agents"
requires-python = ">=3.9"
dependencies = ["httpx>=0.27"]
license = "MIT"
keywords = ["mailgent", "ai", "agent", "email", "mcp", "did", "vault", "sdk"]

[project.urls]
Homepage = "https://mailgent.dev"
Documentation = "https://docs.mailgent.dev"
Repository = "https://github.com/mailgent-dev/python-sdk"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "respx>=0.21"]
